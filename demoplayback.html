<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TriangleVision Web Player</title>
    <script src="https://unpkg.com/fflate"></script>
    <script src="triv-player.js"></script>
    <style>
        body {
            background: #111;
            color: #eee;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        canvas {
            max-width: 90vw;
            max-height: 70vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            background: #000;
        }
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        button {
            padding: 10px 20px;
            background: #333;
            color: white;
            border: 1px solid #555;
            cursor: pointer;
        }
        button:hover {
            background: #444;
        }
        input[type="range"] {
            width: 300px;
        }
    </style>
</head>
<body>
    <h1>TriangleVision Web Player</h1>
    <canvas id="player"></canvas>
    
    <div class="controls">
        <button id="btnPlay">Play</button>
        <button id="btnPause">Pause</button>
        <input type="range" id="seek" value="0" step="0.01">
        <span id="time">0/0</span>
    </div>

    <input type="file" id="fileInput" style="margin-top: 20px;">

    <script>
        const canvas = document.getElementById('player');
        const player = new TrivPlayer(canvas, {
            loop: true,
            onFrame: (current, total) => {
                document.getElementById('time').innerText = `${current}/${total}`;
                document.getElementById('seek').value = current / total;
            }
        });

        document.getElementById('btnPlay').onclick = () => player.play();
        document.getElementById('btnPause').onclick = () => player.pause();
        document.getElementById('seek').oninput = (e) => {
            player.pause();
            player.seek(parseFloat(e.target.value));
        };

        document.getElementById('fileInput').onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                player.load(event.target.result);
            };
            reader.readAsArrayBuffer(file);
        };
    </script>
</body>
</html>
